<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Telepathy Beginner Login</title>
  <link rel="stylesheet" href="telepathybeginner.css?v=20260615i">
</head>
<body>
  <main class="beginner-shell">
    <section class="beginner-panel" aria-labelledby="loginTitle">
      <div class="beginner-top-row">
        <a class="beginner-top-link beginner-top-pill" href="https://telepathyexperiment.com/slide0.php">GYM HOME</a>
        <p class="beginner-kicker">ESP GYM</p>
        <button class="beginner-top-button beginner-top-pill" type="button" onclick="history.back()">BACK</button>
      </div>

      <h1 class="beginner-title" id="loginTitle">Telepathy Beginner</h1>
      <p class="beginner-subtitle">A sender-receiver training app for telepathic development.</p>

      <section class="telepathy-hero" aria-hidden="true">
        <div class="telepathy-hero-frame">
          <img class="telepathy-hero-image" src="minds-connected-uncropped.png" alt="">
        </div>
      </section>

      <div class="email-test-cta-wrap">
        <a class="options-button email-test-launch" href="telepathybeginner-email-test.html?v=20260615i">Test Email</a>
      </div>

      <section class="icon-test-gallery" aria-labelledby="iconTestTitle">
        <p class="icon-test-gallery-title" id="iconTestTitle">Telepathers icon tests</p>
        <div class="icon-test-grid">
          <article class="icon-test-card">
            <img class="icon-test-image" src="tb-test-icon-1.png" alt="Test icon 1 full frame">
            <div class="icon-test-label">1. Full frame</div>
          </article>
          <article class="icon-test-card">
            <img class="icon-test-image" src="tb-test-icon-2.png" alt="Test icon 2 tighter crop">
            <div class="icon-test-label">2. Tight crop</div>
          </article>
          <article class="icon-test-card">
            <img class="icon-test-image" src="tb-test-icon-3.png" alt="Test icon 3 circular badge">
            <div class="icon-test-label">3. Circular badge</div>
          </article>
          <article class="icon-test-card">
            <img class="icon-test-image" src="tb-test-icon-4.png" alt="Test icon 4 rounded tile">
            <div class="icon-test-label">4. Rounded tile</div>
          </article>
        </div>
      </section>
    </section>
  </main>
</body>
</html>
