<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cones Receiver</title>
  <script>
    (function () {
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.getRegistrations().then(function (registrations) {
          registrations.forEach(function (registration) {
            var activeScript = registration.active && registration.active.scriptURL ? registration.active.scriptURL : "";
            var waitingScript = registration.waiting && registration.waiting.scriptURL ? registration.waiting.scriptURL : "";
            var installingScript = registration.installing && registration.installing.scriptURL ? registration.installing.scriptURL : "";
            if (
              activeScript.indexOf("telepathybeginner-sw.js") !== -1
              || waitingScript.indexOf("telepathybeginner-sw.js") !== -1
              || installingScript.indexOf("telepathybeginner-sw.js") !== -1
            ) {
              registration.unregister().catch(function () {});
            }
          });
        }).catch(function () {});
      }
      if ("caches" in window) {
        caches.keys().then(function (keys) {
          keys.forEach(function (key) {
            if (key.indexOf("telepathybeginner-") === 0) {
              caches.delete(key).catch(function () {});
            }
          });
        }).catch(function () {});
      }
    })();
  </script>
  <link rel="stylesheet" href="telepathy.css?v=20260505c">
</head>
<body data-role="receiver">
  <main class="screen">
    <a class="home-link" href="telepathybeginner.html" aria-label="Go to Telepathy Beginner">⌂</a>
    <button class="settings-gear" id="settingsGear" type="button" aria-label="Open settings">⚙</button>
    <div class="countdown-box" id="countdownBox" aria-live="polite">
      <div class="countdown-number prompt" id="countdownNumber">Waiting for sender to be online...</div>
    </div>
    <section class="stage" id="stage" aria-label="Receiver state"></section>
    <section class="settings-screen" id="settingsScreen" aria-label="Settings"></section>
  </main>
    <script src="telepathy.js?v=20260614j"></script>
  </body>
  </html>
