<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cones Sender</title>
  <link rel="preload" href="cone-lowglow-transparent.png" as="image">
  <script>
    (function () {
      var currentUrl;
      try {
        currentUrl = new URL(window.location.href);
      } catch (error) {
        currentUrl = null;
      }
      var swResetRequested = currentUrl && currentUrl.searchParams.get("sw_reset") === "1";
      var hadTelepathyBeginnerCache = false;
      var hadTelepathyBeginnerWorker = false;

      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.getRegistrations().then(function (registrations) {
          registrations.forEach(function (registration) {
            var activeScript = registration.active && registration.active.scriptURL ? registration.active.scriptURL : "";
            var waitingScript = registration.waiting && registration.waiting.scriptURL ? registration.waiting.scriptURL : "";
            var installingScript = registration.installing && registration.installing.scriptURL ? registration.installing.scriptURL : "";
            if (
              activeScript.indexOf("telepathybeginner-sw.js") !== -1
              || waitingScript.indexOf("telepathybeginner-sw.js") !== -1
              || installingScript.indexOf("telepathybeginner-sw.js") !== -1
            ) {
              hadTelepathyBeginnerWorker = true;
              registration.unregister().catch(function () {});
            }
          });
          if ((hadTelepathyBeginnerWorker || hadTelepathyBeginnerCache) && currentUrl && !swResetRequested) {
            currentUrl.searchParams.set("sw_reset", "1");
            window.location.replace(currentUrl.toString());
          }
        }).catch(function () {});
      }
      if ("caches" in window) {
        caches.keys().then(function (keys) {
          keys.forEach(function (key) {
            if (key.indexOf("telepathybeginner-") === 0) {
              hadTelepathyBeginnerCache = true;
              caches.delete(key).catch(function () {});
            }
          });
        }).catch(function () {});
      }
    })();
  </script>
  <link rel="stylesheet" href="telepathy.css?v=20260708a">
</head>
<body data-role="sender">
  <main class="screen">
    <a class="home-link" href="telepathybeginner.html?v=20260708a&amp;open=launcher" aria-label="Go to Telepathy Beginner">&#8962;</a>
    <button class="waiting-back-button hidden" id="waitingBackButton" type="button" aria-label="Return to Telepathy Beginner home">BACK</button>
    <button class="settings-gear" id="settingsGear" type="button" aria-label="Open settings">&#9881;</button>
    <div class="countdown-box" id="countdownBox" aria-live="polite">
      <div class="countdown-number prompt" id="countdownNumber">Waiting for receiver to be online...</div>
    </div>
    <section class="stage" id="stage" aria-label="Cone arrangement"></section>
    <section class="settings-screen" id="settingsScreen" aria-label="Settings"></section>
    <div class="guided-tour-runtime-overlay hidden" id="guidedTourOverlay" aria-live="polite">
      <div class="guided-tour-runtime-balloon" id="guidedTourBalloon" role="dialog" aria-modal="true" aria-label="Guided tour step">
        <p class="guided-tour-runtime-copy" id="guidedTourCopy"></p>
        <p class="guided-tour-runtime-hint" id="guidedTourHint" hidden></p>
        <div class="guided-tour-runtime-actions">
          <button class="confidence-button" id="guidedTourNextButton" type="button">NEXT</button>
        </div>
      </div>
    </div>
  </main>
    <script src="telepathy.js?v=20260708a"></script>
  </body>
  </html>
